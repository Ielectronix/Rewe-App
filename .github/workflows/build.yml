name: Flet APK Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installiere Flet und PDF-Tool
        run: pip install flet pypdf flet-permission-handler

      - name: APK bauen (vollautomatisch)
        run: yes | flet build apk --project "rewe_app" --org "com.rewe.app" --android-permissions "android.permission.READ_EXTERNAL_STORAGE=true" --android-permissions "android.permission.WRITE_EXTERNAL_STORAGE=true" --android-permissions "android.permission.MANAGE_EXTERNAL_STORAGE=true"

      - name: APK hochladen
        uses: actions/upload-artifact@v4
        with:
          name: LIMS-App-APK
          path: build/apk/*.apk