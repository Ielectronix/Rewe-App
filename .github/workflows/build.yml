name: Flet APK Build
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install flet pypdf flet-permission-handler
      - name: APK bauen
        run: |
          yes | flet build apk \
          --android-permissions "android.permission.READ_EXTERNAL_STORAGE=true" \
          --android-permissions "android.permission.WRITE_EXTERNAL_STORAGE=true" \
          --android-permissions "android.permission.MANAGE_EXTERNAL_STORAGE=true"
      - uses: actions/upload-artifact@v4
        with:
          name: LIMS-App-APK
          path: build/apk/*.apk