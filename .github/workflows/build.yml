name: Flet APK Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Flet installieren
        run: pip install flet

      - name: APK bauen
        run: flet build apk

      - name: APK hochladen
        uses: actions/upload-artifact@v4
        with:
          name: LIMS-App-APK
          path: build/apk/*.apk